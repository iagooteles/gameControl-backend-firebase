spring.application.name=gamecontrol-backend-firebase

server.port=8080

# JSON da conta de serviço (relativo à raiz do projeto ao rodar mvn/IDE com working dir = raiz).
# Coloque o arquivo em config/firebase-adminsdk.json (não versionado — ver .gitignore).
# Alternativa: caminho absoluto, ou deixe vazio e use GOOGLE_APPLICATION_CREDENTIALS.
firebase.credentials.path=config/game-control-f3a59-firebase-adminsdk-fbsvc-da742d5aea.json

# Deve ser o mesmo "project_id" do JSON (ou vazio = o SDK usa o do JSON).
firebase.project-id=game-control-f3a59

# Coleção Firestore dos jogos (igual ao console)
firebase.collection.games=games
firebase.collection.users=users
firebase.collection.playlists=playlists
firebase.collection.gamecomments=gameComments
